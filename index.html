<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblioteca Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ENCABEZADO -->
  <header>
    <h1>Biblioteca <span>Digital</span></h1>
    <p>Clásicos, novelas, ensayos y literatura general</p>
  </header>

  <div class="separador">
  <span class="separador-icono">✦ ✦ ✦</span>
</div>

  <!-- BARRA DE BÚSQUEDA -->
<section class="buscador">
    <div class="buscador-contenedor">
      <span class="buscador-icono">🔍</span>
      <input
        type="text"
        id="inputBusqueda"
        placeholder="Buscar por título o autor..."
        oninput="filtrar()"
      />
    </div>
    <select id="selectGenero" class="select-genero" onchange="filtrarPorSelect()">
      <option value="Todos">Todos los géneros</option>
      <option value="Fantasía y ciencia ficción">Fantasía y CF</option>
      <option value="Thriller y misterio">Thriller y misterio</option>
      <option value="Novela clásica">Novela clásica</option>
      <option value="Cuento y relato corto">Cuento y relato corto</option>
      <option value="Ciencia y filosofía natural">Ciencia y filosofía</option>
      <option value="Ensayo filosófico">Ensayo filosófico</option>
      <option value="Novela contemporánea">Novela contemporánea</option>
      <option value="Literatura latinoamericana">Literatura latinoamericana</option>
      <option value="Poesía clásica">Poesía clásica</option>
      <option value="Psicología">Psicología</option>
      <option value="Desarrollo personal">Desarrollo personal</option>
      <option value="Economía y finanzas">Economía y finanzas</option>
      <option value="Biografía y memorias">Biografía y memorias</option>
      <option value="Historia y crónica">Historia y crónica</option>
      <option value="Otros">Otros</option>
    </select>
  </section>

  <!-- CONTADOR DE RESULTADOS -->
  <p id="contador" class="contador"></p>

  <!-- GRID DE LIBROS -->
  <main id="galeria" class="galeria"></main>

  <!-- MENSAJE CUANDO NO HAY RESULTADOS -->
  <p id="sinResultados" class="sin-resultados" style="display:none">
    No se encontraron libros con ese criterio.
  </p>

<div id="paginacion" class="paginacion"></div>

  <script src="app.js"></script>
</body>
</html>
