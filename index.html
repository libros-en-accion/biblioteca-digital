<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblioteca Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ENCABEZADO -->
  <header>
    <h1>Biblioteca <span>Digital</span></h1>
    <p>Clásicos, novelas, ensayos y literatura general</p>
  </header>

  <div class="separador">
  <span class="separador-icono">✦ ✦ ✦</span>
</div>

  <!-- BARRA DE BÚSQUEDA -->
  <section class="buscador">
    <input
      type="text"
      id="inputBusqueda"
      placeholder="Buscar por título o autor..."
      oninput="filtrar()"
    />
  </section>

  <!-- FILTROS POR GÉNERO -->
  <section class="filtros">
  <button class="btn-filtro activo" onclick="filtrarGenero('Todos', this)">Todos</button>
  <button class="btn-filtro" onclick="filtrarGenero('Novela clásica', this)">Novela clásica</button>
  <button class="btn-filtro" onclick="filtrarGenero('Novela contemporánea', this)">Contemporánea</button>
  <button class="btn-filtro" onclick="filtrarGenero('Literatura latinoamericana', this)">Latinoamericana</button>
  <button class="btn-filtro" onclick="filtrarGenero('Thriller y misterio', this)">Thriller</button>
  <button class="btn-filtro" onclick="filtrarGenero('Fantasía y ciencia ficción', this)">Fantasía y CF</button>
  <button class="btn-filtro" onclick="filtrarGenero('Ensayo filosófico', this)">Ensayo filosófico</button>
  <button class="btn-filtro" onclick="filtrarGenero('Ciencia y filosofía natural', this)">Ciencia</button>
  <button class="btn-filtro" onclick="filtrarGenero('Poesía clásica', this)">Poesía</button>
  <button class="btn-filtro" onclick="filtrarGenero('Cuento y relato corto', this)">Cuentos</button>
  <button class="btn-filtro" onclick="filtrarGenero('Desarrollo personal', this)">Desarrollo personal</button>
  <button class="btn-filtro" onclick="filtrarGenero('Psicología', this)">Psicología</button>
  <button class="btn-filtro" onclick="filtrarGenero('Economía y finanzas', this)">Economía</button>
  <button class="btn-filtro" onclick="filtrarGenero('Historia y crónica', this)">Historia</button>
</section>

  <!-- CONTADOR DE RESULTADOS -->
  <p id="contador" class="contador"></p>

  <!-- GRID DE LIBROS -->
  <main id="galeria" class="galeria"></main>

  <!-- MENSAJE CUANDO NO HAY RESULTADOS -->
  <p id="sinResultados" class="sin-resultados" style="display:none">
    No se encontraron libros con ese criterio.
  </p>

  <script src="app.js"></script>
</body>
</html>
