<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblioteca Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ENCABEZADO -->
  <header>
    <h1>Biblioteca <span>Digital</span></h1>
    <p>Clásicos, novelas, ensayos y literatura general</p>
  </header>

  <div class="separador">
  <span class="separador-icono">✦ ✦ ✦</span>
</div>

  <!-- BARRA DE BÚSQUEDA -->
<section class="buscador">
    <div class="buscador-contenedor">
      <span class="buscador-icono">🔍</span>
      <input
        type="text"
        id="inputBusqueda"
        placeholder="Buscar por título o autor..."
        oninput="filtrar()"
      />
    </div>
    <select id="selectGenero" class="select-genero" onchange="filtrarPorSelect()">
      <option value="Todos">Todos los géneros</option>
      <option value="Novela">Novela</option>
      <option value="Ensayo">Ensayo</option>
      <option value="Cuento">Cuento</option>
      <option value="Ciencia Ficción">Ciencia Ficción</option>
      <option value="Filosofía">Filosofía</option>
      <option value="Romance">Romance</option>
      <option value="Fantasía">Fantasía</option>
      <option value="Misterio y Thriller">Misterio y Thriller</option>
      <option value="Poesía">Poesía</option>
      <option value="Teatro">Teatro</option>
      <option value="Terror">Terror</option>
      <option value="Historia y Crónica">Historia y Crónica</option>
      <option value="Divulgación Científica">Divulgación Científica</option>
      <option value="Literatura latinoamericana">Literatura latinoamericana</option>
      <option value="Psicología y Autoayuda">Psicología y Autoayuda</option>
      <option value="Biografía y Memorias">Biografía y Memorias</option>
    </select>
  </section>

  <!-- CONTADOR DE RESULTADOS -->
  <p id="contador" class="contador"></p>

  <!-- GRID DE LIBROS -->
  <main id="galeria" class="galeria"></main>

  <!-- MENSAJE CUANDO NO HAY RESULTADOS -->
  <p id="sinResultados" class="sin-resultados" style="display:none">
    No se encontraron libros con ese criterio.
  </p>

<div id="paginacion" class="paginacion"></div>

  <script src="app.js"></script>
</body>
</html>
